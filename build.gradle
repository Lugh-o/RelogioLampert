plugins {
    id 'java'
    id 'application'
}

group = 'com.ucsal'
version = '1.0'


repositories {
    mavenCentral()
}

dependencies {
    implementation 'org.apache.groovy:groovy:4.0.21'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

application {
    mainClass = 'com.ucsal.Main'
}

test {
    useJUnitPlatform()
}